# https://zk-org.github.io/zk/config/config-notebook.html
[notebook]
dir = "~/Documents/Notes"

# https://zk-org.github.io/zk/config/config-note.html
[note]
language = "en"
default-title = "Untitled"
filename = "{{id}}-{{slug title}}"
extension = "md"
template = "default.md"
id-charset = "hex"
id-length = 16
id-case = "lower"

# https://zk-org.github.io/zk/config/config-extra.html
[extra]

# https://zk-org.github.io/zk/config/config-group.html
[group.daily]
paths = ["journal/daily"]

[group.daily.note]
filename = "{{format-date now '%Y-%m-%d'}}"
template = "daily.md"

# MARKDOWN SETTINGS
[format.markdown]
hashtags = true
colon-tags = true

# https://zk-org.github.io/zk/config/tools.html
[tool]
pager = "less -FIRX"
fzf-preview = "bat -p --color always {-1}"

# https://zk-org.github.io/zk/config/config-filter.html
[filter]
recents = "--sort created- --created-after 'last two weeks'"

# https://zk-org.github.io/zk/config/config-alias.html
[alias]
edlast = "zk edit --limit 1 --sort modified- $@"
recent = "zk edit --sort created- --created-after 'last two weeks' --interactive"
daily = 'zk new --no-input "$ZK_NOTEBOOK_DIR/journal/daily"'
